<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            margin-top: 50px;
        }

        .calculator{
            border: 2px solid black;
            padding: 10px;
        }

        #screen{
            width: 100%;
            height: 40px;
            font-size: 20px;
            text-align: right;
            margin-bottom: 10px;
        }

        .buttons{
            display: grid;
            grid-template-columns: repeat(4, 50px);
            gap: 5px;
        }

        button{
            height: 50px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="calculator">

        <input type="text" id="screen" readonly>

        <div class="buttons">

            <button onclick="show('7')">7</button>
            <button onclick="show('8')">8</button>
            <button onclick="show('9')">9</button>
            <button onclick="show('/')">/</button>

            <button onclick="show('4')">4</button>
            <button onclick="show('5')">5</button>
            <button onclick="show('6')">6</button>
            <button onclick="show('*')">*</button>

            <button onclick="show('1')">1</button>
            <button onclick="show('2')">2</button>
            <button onclick="show('3')">3</button>
            <button onclick="show('-')">-</button>

            <button onclick="show('0')">0</button>
            <button onclick="show('.')">.</button>
            <button onclick="answer()">=</button>
            <button onclick="show('+')">+</button>

            <button onclick="clearScreen()">C</button>

        </div>

    </div>

    <script>

        function show(value)
        {
            document.getElementById("screen").value =
            document.getElementById("screen").value + value;
        }

        function answer()
        {
            var data = document.getElementById("screen").value;
            var result = eval(data);

            document.getElementById("screen").value = result;
        }

        function clearScreen()
        {
            document.getElementById("screen").value = "";
        }

    </script>

</body>
</html>
